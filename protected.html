<script>
    const approvedUsers = ["alice", "bob", "charlie", "dave"];
    const GITHUB_TOKEN = "your_fine_grained_token_here";
    const REPO = "BraveKnight6750/tacc-schedule";

    const params = new URLSearchParams(window.location.search);
    const user = params.get("user");

    if (!user || !approvedUsers.includes(user.toLowerCase())) {
        window.location.href = "index.html";
    } else {
        document.getElementById("greeting").textContent = "Welcome, " + user + "!";
    }

    async function addEvent() {
        const name        = document.getElementById("eventName").value.trim();
        const start       = document.getElementById("startTime").value;
        const end         = document.getElementById("endTime").value;
        const location    = document.getElementById("location").value.trim();
        const description = document.getElementById("description").value.trim();
        const message     = document.getElementById("message");

        if (!name || !start || !end) {
            message.textContent = "Please fill in all required fields.";
            message.className = "error";
            return;
        }

        message.textContent = "Saving...";
        message.className = "";

        const res = await fetch(
            `https://api.github.com/repos/${REPO}/actions/workflows/add_event.yml/dispatches`,
            {
                method: "POST",
                headers: {
                    Authorization: "Bearer " + GITHUB_TOKEN,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ref: "main",
                    inputs: {
                        event_name: name,
                        start_time: start,
                        end_time:   end,
                        location:   location,
                        description: description,
                        user:       user
                    }
                })
            }
        );

        if (res.status === 204) {
            message.textContent = "Event submitted! It will appear in the calendar shortly.";
            message.className = "success";
        } else {
            const err = await res.json();
            message.textContent = "Error: " + err.message;
            message.className = "error";
        }
    }
</script>
